apiVersion: apps/v1
kind: Deployment
metadata:
  name: sentix-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sentix-api
  template:
    metadata:
      labels:
        app: sentix-api
    spec:
      containers:
      - name: sentix-api
        image: sentix-api:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 5000
        env:
        - name: REDIS_URL
          value: "redis://redis-service:6379/0"
        - name: SCRAPER_URL
          value: "http://scraper-service:3000"
        - name: GEMINI_API_KEY
          valueFrom:
            secretKeyRef:
              name: sentix-secrets
              key: gemini_api_key
---
apiVersion: v1
kind: Service
metadata:
  name: sentix-api-service
spec:
  type: LoadBalancer
  ports:
  - port: 5000
    targetPort: 5000
  selector:
    app: sentix-api
