apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ai-worker
  template:
    metadata:
      labels:
        app: ai-worker
    spec:
      containers:
      - name: ai-worker
        image: sentix-api:latest
        imagePullPolicy: Never
        command: ["celery", "-A", "backend.worker", "worker", "--loglevel=info"]
        env:
        - name: REDIS_URL
          value: "redis://redis-service:6379/0"
        - name: GEMINI_API_KEY
          valueFrom:
            secretKeyRef:
              name: sentix-secrets
              key: gemini_api_key
