
services:
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "5000:5000"
    environment:
      - SCRAPER_URL=http://scraper:3000
      - REDIS_URL=redis://redis:6379/0
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    depends_on:
      - scraper
      - redis
    volumes:
      - ./backend/data:/app/backend/data
      - ./backend/logs:/app/backend/logs
    networks:
      - sentix-net

  ai_worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: ["celery", "-A", "backend.worker", "worker", "--loglevel=info"]
    environment:
      - REDIS_URL=redis://redis:6379/0
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    depends_on:
      - redis
    volumes:
      - ./backend/data:/app/backend/data
      - ./backend/logs:/app/backend/logs
    networks:
      - sentix-net

  scraper:
    build:
      context: ./scraper
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
    networks:
      - sentix-net

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - sentix-net

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - sentix-net

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus
    networks:
      - sentix-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:5000
    depends_on:
      - api
    networks:
      - sentix-net

networks:
  sentix-net:
    driver: bridge

volumes:
  redis_data:
