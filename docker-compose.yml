version: "3.8"

services:
  # --- BACKEND API ---
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "5000:5000"
    environment:
      - SCRAPER_URL=http://scraper:3000
      - REDIS_URL=redis://redis:6379/0
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    depends_on:
      - scraper
      - redis
    volumes:
      - ./backend/data:/app/data
      - ./backend/logs:/app/logs
    networks:
      - sentix-net

  # --- CELERY WORKER ---
  ai_worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: [ "celery", "-A", "backend.worker", "worker", "--loglevel=info" ]
    environment:
      - REDIS_URL=redis://redis:6379/0
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    depends_on:
      - redis
    volumes:
      - ./backend/data:/app/data
    networks:
      - sentix-net

  # --- SCRAPER SERVICE ---
  scraper:
    build:
      context: ./scraper
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
    networks:
      - sentix-net

  # --- DATABASE ---
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - sentix-net

  # --- MONITORING ---
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - sentix-net

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
    depends_on:
      - prometheus
    networks:
      - sentix-net

  # --- FRONTEND ---
  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=${VITE_API_URL}
    depends_on:
      - api
    networks:
      - sentix-net

networks:
  sentix-net:
    driver: bridge

volumes:
  redis_data:
